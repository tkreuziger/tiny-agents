[tox]
envlist = fmt, lint, typecheck, test
skip_missing_interpreters = true

[testenv]
basepython = python3.12
uv = true
uv_sync = true
uv_resolution = lowest-direct

[testenv:fmt]
description = Format code with ruff
commands = ruff format src/ tests/

[testenv:lint]
description = Lint code with ruff
commands = ruff check src/ tests/ --fix

[testenv:typecheck]
description = Type-check with mypy
commands = mypy src/tiny_agents/

[testenv:test]
description = Run tests with coverage
commands =
    pytest --cov=tiny_agents --cov-report=term-missing --cov-report=html tests/

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
